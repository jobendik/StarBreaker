<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>VOID DRIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  :root{
    --bg:#05070f; --cyan:#46e0ff; --cyan2:#9af2ff; --gold:#ffcf4a; --pink:#ff5c8a;
    --green:#7cfc8a; --purple:#b388ff; --ink:rgba(9,14,28,.94);
    --line:rgba(70,224,255,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;width:100%;overflow:hidden;background:var(--bg);
    font-family:'Chakra Petch',ui-monospace,'SF Mono',Menlo,monospace;color:#dff3ff;
    touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none;}
  canvas{display:block;position:fixed;inset:0;}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    flex-direction:column;z-index:20;padding:24px;text-align:center;}
  .overlay.show{display:flex;}
  .panel{width:min(440px,92vw);background:var(--ink);border:1.5px solid var(--line);
    border-radius:16px;padding:26px 22px;backdrop-filter:blur(6px);
    box-shadow:0 0 0 1px rgba(70,224,255,.08),0 12px 50px rgba(0,0,0,.55),0 0 60px rgba(70,224,255,.10);}
  .title{font-weight:700;letter-spacing:.16em;font-size:clamp(30px,9vw,46px);margin:0 0 2px;
    color:#eafcff;text-shadow:0 0 18px rgba(70,224,255,.65);}
  .sub{letter-spacing:.42em;font-size:12px;color:var(--cyan);opacity:.85;margin-bottom:18px;text-transform:uppercase;}
  .btn{display:block;width:100%;margin:9px 0;padding:14px;border-radius:10px;cursor:pointer;
    font-family:inherit;font-weight:600;letter-spacing:.18em;font-size:15px;text-transform:uppercase;
    background:transparent;transition:.14s ease;}
  .btn.gold{border:1.5px solid var(--gold);color:var(--gold);text-shadow:0 0 10px rgba(255,207,74,.6);
    box-shadow:0 0 22px rgba(255,207,74,.14) inset;}
  .btn.gold:active{background:rgba(255,207,74,.16);}
  .btn.cyan{border:1.5px solid var(--line);color:var(--cyan2);}
  .btn.cyan:active{background:rgba(70,224,255,.14);}
  .btn:disabled{opacity:.35;cursor:default;}
  .stats{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:6px 0 16px;}
  .stat{flex:1 1 40%;min-width:120px;border:1px solid rgba(70,224,255,.22);border-radius:9px;padding:10px 8px;}
  .stat b{display:block;font-size:22px;color:#eafcff;font-weight:700;}
  .stat span{font-size:10px;letter-spacing:.18em;color:var(--cyan);opacity:.8;text-transform:uppercase;}
  .shop{margin:6px 0 4px;text-align:left;}
  .shoprow{display:flex;align-items:center;gap:10px;padding:9px 8px;border:1px solid rgba(70,224,255,.16);
    border-radius:9px;margin:7px 0;}
  .shoprow .nm{flex:1;font-size:13px;letter-spacing:.04em;}
  .shoprow .nm small{display:block;color:#8fb6cc;font-size:10.5px;letter-spacing:.02em;}
  .pips{display:flex;gap:3px;margin-top:4px;}
  .pip{width:13px;height:5px;border-radius:2px;background:rgba(70,224,255,.18);}
  .pip.on{background:var(--cyan);box-shadow:0 0 7px rgba(70,224,255,.8);}
  .buy{border:1px solid var(--gold);color:var(--gold);background:transparent;border-radius:8px;
    padding:8px 11px;font-family:inherit;font-weight:600;font-size:12px;letter-spacing:.06em;cursor:pointer;white-space:nowrap;}
  .buy:disabled{border-color:#3a4a55;color:#5b6b75;}
  .buy.max{border-color:var(--green);color:var(--green);}
  .cores{font-size:13px;letter-spacing:.14em;color:var(--gold);margin:2px 0 14px;text-transform:uppercase;}
  .cores b{color:#ffe79a;font-size:18px;}
  #levelup .panel{width:min(560px,96vw);background:transparent;border:none;box-shadow:none;padding:0;backdrop-filter:none;}
  .lvtitle{letter-spacing:.34em;font-size:clamp(16px,5vw,22px);color:var(--cyan2);font-weight:700;
    margin-bottom:14px;text-shadow:0 0 14px rgba(70,224,255,.6);}
  .cards{display:flex;gap:10px;justify-content:center;align-items:stretch;}
  .card{flex:1 1 0;max-width:170px;min-width:0;background:rgba(8,16,30,.96);border:1.5px solid var(--line);
    border-radius:13px;padding:14px 9px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    box-shadow:0 0 26px rgba(70,224,255,.10),0 10px 30px rgba(0,0,0,.5);transition:transform .1s ease, box-shadow .1s ease;}
  .card:active{transform:translateY(2px) scale(.98);}
  .card.new{border-color:var(--purple);box-shadow:0 0 30px rgba(179,136,255,.22),0 10px 30px rgba(0,0,0,.5);}
  .badge{font-size:9px;letter-spacing:.14em;font-weight:700;color:var(--cyan);border:1px solid var(--line);
    border-radius:20px;padding:3px 9px;text-transform:uppercase;margin-bottom:11px;white-space:nowrap;}
  .card.new .badge{color:var(--purple);border-color:rgba(179,136,255,.6);}
  .card.epic{border-color:#c07bff;box-shadow:0 0 30px rgba(192,123,255,.26),0 10px 30px rgba(0,0,0,.5);}
  .card.epic .badge{color:#c07bff;border-color:rgba(192,123,255,.6);}
  .card.legendary{border-color:#ffcf4a;box-shadow:0 0 36px rgba(255,207,74,.32),0 10px 30px rgba(0,0,0,.5);}
  .card.legendary .badge{color:#ffcf4a;border-color:rgba(255,207,74,.6);}
  .card svg{width:50px;height:50px;margin:2px 0 10px;}
  .card .name{font-weight:700;letter-spacing:.06em;font-size:13px;line-height:1.1;margin-bottom:5px;color:#eafcff;text-transform:uppercase;}
  .card .desc{font-size:11px;color:#9fc4d8;line-height:1.25;}
  .hint{margin-top:14px;font-size:11px;letter-spacing:.18em;color:#6f93a6;text-transform:uppercase;}
  @media (max-height:560px){ .card svg{width:40px;height:40px;} .panel{padding:18px 16px;} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="overlay" id="menu">
  <div class="panel">
    <div class="title">VOID DRIFT</div>
    <div class="sub">Survive the Swarm</div>
    <div class="cores">Cores: <b id="m-cores">0</b></div>
    <button class="btn gold" id="m-play">&#9654; Launch</button>
    <div class="shop" id="shop"></div>
    <div class="hint" id="m-best">Best 0</div>
  </div>
</div>

<div class="overlay" id="levelup">
  <div class="panel">
    <div class="lvtitle" id="lv-title">LEVEL UP</div>
    <div class="cards" id="lv-cards"></div>
    <div class="hint">Choose an upgrade</div>
  </div>
</div>

<div class="overlay" id="pause">
  <div class="panel">
    <div class="title" style="font-size:34px">PAUSED</div>
    <div class="sub" id="p-stat">&nbsp;</div>
    <button class="btn cyan" id="p-resume">Resume</button>
    <button class="btn cyan" id="p-quit">Abandon Run</button>
  </div>
</div>

<div class="overlay" id="gameover">
  <div class="panel">
    <div class="title" id="go-title" style="font-size:34px;color:var(--gold);text-shadow:0 0 18px rgba(255,207,74,.6)">SECOND CHANCE</div>
    <div class="sub" id="go-sub">Restore your ship and keep fighting</div>
    <div class="stats" id="go-stats"></div>
    <button class="btn gold" id="go-revive">&#9654; Revive</button>
    <button class="btn cyan" id="go-menu">End Run</button>
  </div>
</div>

<script>
"use strict";
(function(){
/* ===================== TUNING (the real 90%) ===================== */
const CFG = {
  player:{ maxHP:100, speed:236, radius:13, invuln:0.55, pickup:78 },
  xp:{ base:8 },
  spawn:{ baseInterval:1.05, minInterval:0.16, ramp:0.013, maxEnemies:170, hpRamp:1/42, dmgRamp:1/200 },
  boss:{ every:60 },
  caps:{ bullets:240, missiles:70, particles:640, gems:400, texts:48 },
};
const ENEMIES = {
  drone:   { hp:14, speed:92,  r:13, dmg:8,  xp:1, color:'#ff6b5b', sides:3 },
  swarmer: { hp:7,  speed:170, r:9,  dmg:5,  xp:1, color:'#ff5c8a', sides:4 },
  brute:   { hp:62, speed:64,  r:22, dmg:16, xp:5, color:'#ff3b3b', sides:6 },
  splitter:{ hp:26, speed:104, r:16, dmg:7,  xp:2, color:'#ffa24a', sides:4 },
  shard:   { hp:5,  speed:188, r:7,  dmg:5,  xp:1, color:'#ffb24a', sides:3 },
  boss:    { hp:620,speed:50,  r:40, dmg:30, xp:30,color:'#ff2d6f', sides:8 },
};
const WDEF = {
  pulse:  {name:'Pulse Blaster',icon:'pulse',  max:7, base:'Auto-fires bolts at the nearest foe.', ups:['','+1 bolt','+damage','faster fire','+1 bolt','piercing shots','+damage']},
  orbital:{name:'Orbital Ring', icon:'orbital',max:7, base:'Orbs circle you, shredding on contact.', ups:['','+1 orb','wider orbit','+damage','+1 orb','faster spin','+1 orb']},
  spread: {name:'Scatter Laser',icon:'spread', max:7, base:'Fires a spreading cone of bolts.', ups:['','+1 bolt','+damage','faster fire','+1 bolt','wider cone','+damage']},
  missile:{name:'Seeker Pods',  icon:'missile',max:7, base:'Homing missiles that blast on impact.', ups:['','+damage','+1 missile','bigger blast','faster fire','+1 missile','+damage']},
  nova:   {name:'Pulse Nova',   icon:'nova',   max:7, base:'Releases an expanding shockwave.', ups:['','bigger wave','+damage','faster pulse','bigger wave','+damage','faster pulse']},
};
const PDEF = {
  power: {name:'Overdrive',    icon:'power', max:6, desc:'+13% all damage'},
  haste: {name:'Coolant',      icon:'haste', max:6, desc:'+10% fire rate'},
  speed: {name:'Thrusters',    icon:'speed', max:6, desc:'+8% move speed'},
  maxhp: {name:'Plating',      icon:'hp',    max:6, desc:'+25 max integrity'},
  magnet:{name:'Tractor Field',icon:'magnet',max:6, desc:'+30% pickup range'},
  regen: {name:'Repair Bay',   icon:'regen', max:6, desc:'+0.6 integrity / s'},
  greed: {name:'Data Siphon',  icon:'greed', max:6, desc:'+15% XP gain'},
  armor: {name:'Deflectors',   icon:'armor', max:6, desc:'-10% damage taken'},
  crit:  {name:'Targeting Array',icon:'power',max:6, desc:'+5% critical chance'},
};
const META_DEF = [
  {key:'hp',  name:'Reinforced Hull', sub:'+20 starting integrity', max:5, base:40},
  {key:'dmg', name:'Power Core',      sub:'+6% starting damage',     max:5, base:60},
  {key:'spd', name:'Ion Drive',       sub:'+4% move speed',          max:5, base:60},
  {key:'mag', name:'Magnetic Coils',  sub:'+15% pickup range',       max:5, base:40},
  {key:'rev', name:'Backup Reactor',  sub:'+1 free revive',          max:1, base:220},
];
const S='#9af2ff';
const ICONS = {
  pulse:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l7 5-7 5M11 7l7 5-7 5"/></svg>`,
  orbital:`<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.8"><circle cx="12" cy="12" r="4.2"/><ellipse cx="12" cy="12" rx="10" ry="3.8" transform="rotate(-22 12 12)"/></svg>`,
  spread: `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.8" stroke-linecap="round"><path d="M12 21L6 5M12 21l6-16M12 21V8"/></svg>`,
  missile:`<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M14 4c3 0 6 3 6 6l-7 7-3-3z"/><path d="M7 17l-2.5 2.5M10.5 14l-4 4"/></svg>`,
  nova:   `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" opacity=".7"/><circle cx="12" cy="12" r="10.5" opacity=".4"/></svg>`,
  power:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l2.4 6.3L21 12l-6.6 2.7L12 21l-2.4-6.3L3 12l6.6-2.7z"/></svg>`,
  haste:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M13 3L5 14h6l-2 7 8-11h-6z"/></svg>`,
  speed:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7l6 5-6 5M11 7l6 5-6 5"/></svg>`,
  hp:     `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6z"/><path d="M12 9v6M9 12h6"/></svg>`,
  magnet: `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linecap="round"><path d="M6 4v7a6 6 0 0012 0V4M6 4h3M15 4h3M6 9h3M15 9h3"/></svg>`,
  regen:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linecap="round"><path d="M12 8v8M8 12h8"/><path d="M5 12a7 7 0 0110-6.3"/></svg>`,
  greed:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l8 9-8 9-8-9z"/><path d="M9 12h6"/></svg>`,
  armor:  `<svg viewBox="0 0 24 24" fill="none" stroke="${S}" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6z"/></svg>`,
};

/* ===================== HELPERS ===================== */
const TAU=Math.PI*2;
const rnd=(a=1,b)=> b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}

/* ===================== STORAGE (guarded) ===================== */
const STORE='voiddrift_meta_v1';
let meta={cores:0,best:0,ach:[],up:{hp:0,dmg:0,spd:0,mag:0,rev:0}};
function loadMeta(){try{const s=localStorage.getItem(STORE);if(s){const o=JSON.parse(s);meta.cores=o.cores||0;meta.best=o.best||0;meta.ach=o.ach||[];meta.up=Object.assign({hp:0,dmg:0,spd:0,mag:0,rev:0},o.up||{});}}catch(e){}}
function saveMeta(){try{localStorage.setItem(STORE,JSON.stringify(meta));}catch(e){}}

/* ===================== CRAZYGAMES SDK (guarded) ===================== */
const SDK=(window.CrazyGames&&window.CrazyGames.SDK)?window.CrazyGames.SDK:null;
let sdkReady=false;
(async function(){try{if(SDK&&SDK.init){await SDK.init();sdkReady=true;}}catch(e){sdkReady=false;}})();
const sdkStart=function(){try{SDK&&SDK.game&&SDK.game.gameplayStart&&SDK.game.gameplayStart();}catch(e){}};
const sdkStop =function(){try{SDK&&SDK.game&&SDK.game.gameplayStop&&SDK.game.gameplayStop();}catch(e){}};
const sdkHappy=function(){try{SDK&&SDK.game&&SDK.game.happytime&&SDK.game.happytime();}catch(e){}};
function sdkRewarded(cb){try{if(SDK&&SDK.ad&&SDK.ad.requestAd){SDK.ad.requestAd('rewarded',{adFinished:function(){cb(true);},adError:function(){cb(false);},adStarted:function(){}});}else cb(false);}catch(e){cb(false);}}

/* ===================== AUDIO (procedural) ===================== */
const AudioM={ctx:null,master:null,muted:false,last:{}};
function audioInit(){ if(AudioM.ctx)return; try{ const AC=window.AudioContext||window.webkitAudioContext; AudioM.ctx=new AC(); AudioM.master=AudioM.ctx.createGain(); AudioM.master.gain.value=AudioM.muted?0:0.5; AudioM.master.connect(AudioM.ctx.destination);}catch(e){} }
function audioResume(){ try{ AudioM.ctx&&AudioM.ctx.state==='suspended'&&AudioM.ctx.resume(); }catch(e){} }
function tone(freq,dur,type,vol,slideTo){ if(!AudioM.ctx||AudioM.muted)return; const t=AudioM.ctx.currentTime; const o=AudioM.ctx.createOscillator(),g=AudioM.ctx.createGain(); o.type=type||'square'; o.frequency.setValueAtTime(freq,t); if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g);g.connect(AudioM.master); o.start(t);o.stop(t+dur+0.02); }
function noise(dur,vol,freq){ if(!AudioM.ctx||AudioM.muted)return; const t=AudioM.ctx.currentTime; const n=Math.floor(AudioM.ctx.sampleRate*dur); const buf=AudioM.ctx.createBuffer(1,n,AudioM.ctx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n); const sN=AudioM.ctx.createBufferSource();sN.buffer=buf; const f=AudioM.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=freq||1200; const g=AudioM.ctx.createGain();g.gain.value=vol||0.3; sN.connect(f);f.connect(g);g.connect(AudioM.master); sN.start(t); }
function throttled(key,ms){ const t=performance.now(); if((AudioM.last[key]||0)+ms>t)return false; AudioM.last[key]=t; return true; }
const sfx={
  shoot:function(){ if(throttled('shoot',55)) tone(660,0.05,'square',0.05,420); },
  spread:function(){ if(throttled('spread',70)) tone(520,0.06,'sawtooth',0.05,300); },
  missile:function(){ if(throttled('missile',90)) tone(220,0.12,'sawtooth',0.07,90); },
  nova:function(){ tone(140,0.3,'sine',0.12,60); noise(0.25,0.12,500); },
  hit:function(){ if(throttled('hit',32)) noise(0.04,0.05,2600); },
  explode:function(){ if(throttled('explode',60)){ noise(0.28,0.22,900); tone(90,0.25,'sine',0.12,40);} },
  pickup:function(){ if(throttled('pickup',26)) tone(880,0.045,'triangle',0.04,1320); },
  hurt:function(){ noise(0.18,0.2,500); tone(180,0.18,'square',0.12,70); },
  levelup:function(){ [523,659,784,1046].forEach(function(f,i){setTimeout(function(){tone(f,0.16,'triangle',0.13);},i*70);}); },
  revive:function(){ [392,523,659,880].forEach(function(f,i){setTimeout(function(){tone(f,0.2,'sine',0.14);},i*80);}); },
  boss:function(){ tone(70,0.7,'sawtooth',0.18,55); noise(0.5,0.14,400); },
};

/* ===================== CANVAS ===================== */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight,DPR=1,safeTop=12;
const probe=document.createElement('div');
probe.style.cssText='position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top,0px);pointer-events:none;';
document.body.appendChild(probe);
function resize(){ W=innerWidth;H=innerHeight; DPR=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  safeTop=Math.max(12,probe.offsetHeight+10);
}
addEventListener('resize',resize); resize();

const glowCache=new Map();
function glow(color){ let g=glowCache.get(color); if(g)return g; const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d'); const gr=x.createRadialGradient(64,64,0,64,64,64); gr.addColorStop(0,hexA(color,0.95)); gr.addColorStop(0.35,hexA(color,0.4)); gr.addColorStop(1,hexA(color,0)); x.fillStyle=gr;x.fillRect(0,0,128,128); glowCache.set(color,c); return c; }
function blit(color,x,y,r){ ctx.drawImage(glow(color),x-r,y-r,r*2,r*2); }

const stars=[]; const STN=150;
for(let i=0;i<STN;i++) stars.push({x:rnd(2000),y:rnd(2000),z:rnd(0.18,0.6),s:rnd(0.6,1.8),a:rnd(0.25,0.8),tw:rnd(1,3),ph:rnd(TAU)});

/* ===================== STATE ===================== */
const MENU=0,PLAYING=1,LEVELUP=2,PAUSED=3,DEAD=4;
let state=MENU;
let enemies=[],bullets=[],missiles=[],novas=[],gems=[],pickups=[],particles=[],texts=[];
let idc=1;
const cam={x:0,y:0};
const shake={mag:0};
const player={x:0,y:0,angle:-Math.PI/2,weapons:[]};
const run={time:0,kills:0,level:1,revivesLeft:0,bannerT:0,reviveFlash:0};
const keys=Object.create(null);
const joy={active:false,id:null,ox:0,oy:0,dx:0,dy:0,max:62};
let announces=[];

/* ===================== PLAYER / RUN INIT ===================== */
function recompute(){
  const p=player, P=p.passt;
  p.dmgMul=(1+0.13*P.power)*(1+0.06*meta.up.dmg);
  p.fireMul=Math.pow(0.90,P.haste);
  p.speedMul=(1+0.08*P.speed)*(1+0.04*meta.up.spd);
  p.pickupMul=(1+0.30*P.magnet)*(1+0.15*meta.up.mag);
  p.regen=0.6*P.regen;
  p.xpMul=1+0.15*P.greed;
  p.armor=Math.min(0.6,0.10*P.armor);
  p.critChance=0.08+0.05*(P.crit||0);

/* ===================== SPAWNING ===================== */

function weightedType(){

  if(t>25) bag.push('brute');
  if(t>40) bag.push('splitter','swarmer');

function spawnEnemy(type,isBoss){

/* ===================== SPATIAL GRID ===================== */
const CELL=74; let grid=new Map();
function buildGrid(){ grid.clear(); for(const e of enemies){ if(e.dead)continue; const k=(Math.floor(e.x/CELL))+'_'+(Math.floor(e.y/CELL)); let a=grid.get(k); if(!a){a=[];grid.set(k,a);} a.push(e);} }
function queryCircle(x,y,r){ const out=[]; const a=Math.floor((x-r)/CELL),b=Math.floor((x+r)/CELL),c=Math.floor((y-r)/CELL),d=Math.floor((y+r)/CELL); for(let cx=a;cx<=b;cx++)for(let cy=c;cy<=d;cy++){const arr=grid.get(cx+'_'+cy); if(arr)for(let i=0;i<arr.length;i++)out.push(arr[i]);} return out; }

/* ===================== ENEMY UPDATE ===================== */
function updateEnemies(dt){
  buildGrid();
  const dmgScale=1+run.time*CFG.spawn.dmgRamp;
  for(const e of enemies){
    if(e.dead)continue;
    let dx=player.x-e.x, dy=player.y-e.y; const dl=Math.hypot(dx,dy)||1; dx/=dl;dy/=dl;
    let sx=0,sy=0; const near=queryCircle(e.x,e.y,e.r+12); let cnt=0;
    for(const o of near){ if(o===e||o.dead)continue; const ox=e.x-o.x,oy=e.y-o.y; const od=ox*ox+oy*oy; const md=(e.r+o.r); if(od<md*md&&od>0.01){ const id=1/Math.sqrt(od); sx+=ox*id; sy+=oy*id; if(++cnt>6)break; } }
    e.vx=dx*e.speed+sx*e.speed*0.6; e.vy=dy*e.speed+sy*e.speed*0.6;
    e.x+=e.vx*dt+e.kbx; e.y+=e.vy*dt+e.kby;
    e.kbx*=0.84; e.kby*=0.84;
    e.spin+=e.spv*dt; if(e.flash>0)e.flash-=dt;
    e._dmg=e.dmg*dmgScale;
  }
}

/* ===================== WEAPONS ===================== */
function nearestEnemy(x,y){ let best=null,bd=1e18; for(const e of enemies){ if(e.dead)continue; const dx=e.x-x,dy=e.y-y,d=dx*dx+dy*dy; if(d<bd){bd=d;best=e;} } return best; }
function spawnBullet(x,y,vx,vy,dmg,r,pierce,color){ if(bullets.length>=CFG.caps.bullets)bullets.shift(); bullets.push({x:x,y:y,vx:vx,vy:vy,dmg:dmg,r:r,pierce:pierce,color:color,life:1.5,hits:0,hit:pierce>0?new Set():null,dead:false}); }
function spawnMissile(x,y,vx,vy,dmg,aoe){ if(missiles.length>=CFG.caps.missiles)missiles.shift(); missiles.push({x:x,y:y,vx:vx,vy:vy,dmg:dmg,aoe:aoe,life:3,spd:120,dead:false}); }

function updateWeapons(dt){
  for(const w of player.weapons){
    if(w.type==='orbital'){ const lvl=w.level; const spin=1.8+(lvl-1)*0.18; w.ang=(w.ang||0)+spin*dt; continue; }
    w.t-=dt; if(w.t>0)continue; fireWeapon(w);
  }
}
function fireWeapon(w){
  const lvl=w.level, dmgMul=player.dmgMul, fireMul=player.fireMul;
  if(w.type==='pulse'){
    w.t=Math.max(0.16,0.6-(lvl-1)*0.05)*fireMul;
    const count=[1,2,2,3,3,4,5][Math.min(lvl-1,6)], dmg=(10+(lvl-1)*4)*dmgMul, pierce=lvl>=6?1:0;
    const tgt=nearestEnemy(player.x,player.y); const base=tgt?Math.atan2(tgt.y-player.y,tgt.x-player.x):player.angle;
    for(let i=0;i<count;i++){ const a=base+(i-(count-1)/2)*0.16; spawnBullet(player.x,player.y,Math.cos(a)*545,Math.sin(a)*545,dmg,5,pierce,'#9af2ff'); }
    sfx.shoot();
  } else if(w.type==='spread'){
    w.t=Math.max(0.3,0.85-(lvl-1)*0.06)*fireMul;
    const count=3+(lvl-1), dmg=(7+(lvl-1)*3)*dmgMul, cone=0.5+(lvl>=6?0.28:0);
    const tgt=nearestEnemy(player.x,player.y); const base=tgt?Math.atan2(tgt.y-player.y,tgt.x-player.x):player.angle;
    for(let i=0;i<count;i++){ const frac=count>1?(i/(count-1)-0.5):0; const a=base+frac*cone; spawnBullet(player.x,player.y,Math.cos(a)*475,Math.sin(a)*475,dmg,4,0,'#bff6ff'); }
    sfx.spread();
  } else if(w.type==='missile'){
    w.t=Math.max(0.55,1.5-(lvl-1)*0.12)*fireMul;
    const count=[1,1,2,2,3,3,4][Math.min(lvl-1,6)], dmg=(20+(lvl-1)*8)*dmgMul, aoe=56+(lvl-1)*8;
    for(let i=0;i<count;i++){ const a=player.angle+rnd(-0.6,0.6); spawnMissile(player.x,player.y,Math.cos(a)*120,Math.sin(a)*120,dmg,aoe); }
    sfx.missile();
  } else if(w.type==='nova'){
    w.t=Math.max(1.2,3.2-(lvl-1)*0.25)*fireMul;
    const radius=130+(lvl-1)*22, dmg=(16+(lvl-1)*7)*dmgMul;
    novas.push({x:player.x,y:player.y,r:10,maxR:radius,dmg:dmg,hit:new Set(),dur:0.42,t:0});
    sfx.nova();
  }
}

/* ===================== PROJECTILES ===================== */
function updateProjectiles(dt){
  for(const b of bullets){ if(b.dead)continue; b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt; if(b.life<=0||Math.hypot(b.x-player.x,b.y-player.y)>1500)b.dead=true; }
  for(const m of missiles){ if(m.dead)continue;
    const tgt=nearestEnemy(m.x,m.y);
    if(tgt){ const dA=Math.atan2(tgt.y-m.y,tgt.x-m.x); let cA=Math.atan2(m.vy,m.vx); let diff=((dA-cA+Math.PI)%TAU+TAU)%TAU-Math.PI; cA+=clamp(diff,-6*dt,6*dt); m.spd=Math.min(380,m.spd+520*dt); m.vx=Math.cos(cA)*m.spd; m.vy=Math.sin(cA)*m.spd; }
    m.x+=m.vx*dt;m.y+=m.vy*dt;m.life-=dt;
    if(m.life<=0){ explodeMissile(m); continue; }
    const near=queryCircle(m.x,m.y,m.aoe); let hitc=false; for(const e of near){ if(e.dead)continue; const dd=(e.x-m.x)*(e.x-m.x)+(e.y-m.y)*(e.y-m.y); if(dd<(e.r+6)*(e.r+6)){ hitc=true; break; } }
    if(hitc){ explodeMissile(m); continue; }
    if(Math.random()<0.6) addParticle(m.x,m.y,rnd(-20,20),rnd(-20,20),0.3,4,'#ffb24a');
  }
  for(const nv of novas){ if(nv.dead)continue; nv.t+=dt; nv.r=lerp(10,nv.maxR,nv.t/nv.dur);
    const near=queryCircle(nv.x,nv.y,nv.r+30);
    for(const e of near){ if(e.dead||nv.hit.has(e.id))continue; const d=Math.hypot(e.x-nv.x,e.y-nv.y); if(d<nv.r+e.r){ nv.hit.add(e.id); const a=Math.atan2(e.y-nv.y,e.x-nv.x); damageEnemy(e,nv.dmg,Math.cos(a)*8,Math.sin(a)*8); } }
    if(nv.t>=nv.dur)nv.dead=true;
  }
}
function explodeMissile(m){ if(m.dead)return; m.dead=true; const near=queryCircle(m.x,m.y,m.aoe);
  for(const e of near){ if(e.dead)continue; const d=Math.hypot(e.x-m.x,e.y-m.y); if(d<m.aoe+e.r){ const a=Math.atan2(e.y-m.y,e.x-m.x); damageEnemy(e,m.dmg,Math.cos(a)*10,Math.sin(a)*10); } }
  for(let i=0;i<16;i++){ const a=rnd(TAU),s=rnd(40,200); addParticle(m.x,m.y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.3,0.6),rnd(4,9),'#ffb24a'); }
  popText(m.x,m.y,Math.round(m.dmg),'#ffb24a'); shake.mag=Math.max(shake.mag,7); sfx.explode();
}

/* ===================== COLLISIONS / DAMAGE ===================== */
function collisions(dt){
  for(const b of bullets){ if(b.dead)continue; const near=queryCircle(b.x,b.y,b.r+24);
    for(const e of near){ if(e.dead)continue; if(b.hit&&b.hit.has(e.id))continue;
      const rr=(b.r+e.r); if((e.x-b.x)*(e.x-b.x)+(e.y-b.y)*(e.y-b.y)<rr*rr){
        damageEnemy(e,b.dmg,b.vx*0.012,b.vy*0.012); if(b.hit)b.hit.add(e.id); b.hits++; if(b.hits>b.pierce){b.dead=true;break;} } } }
  for(const w of player.weapons){ if(w.type!=='orbital')continue; const lvl=w.level; const orbs=[2,2,3,3,4,5,6][Math.min(lvl-1,6)]; const rad=64+(lvl-1)*8; const dps=(26+(lvl-1)*10)*player.dmgMul;
    w._orbs=[];
    for(let k=0;k<orbs;k++){ const oa=w.ang+k*TAU/orbs; const ox=player.x+Math.cos(oa)*rad, oy=player.y+Math.sin(oa)*rad; w._orbs.push({x:ox,y:oy});
      const near=queryCircle(ox,oy,12+24); for(const e of near){ if(e.dead)continue; const rr=e.r+11; if((e.x-ox)*(e.x-ox)+(e.y-oy)*(e.y-oy)<rr*rr){ const a=Math.atan2(e.y-player.y,e.x-player.x); damageEnemy(e,dps*dt,Math.cos(a)*1.5,Math.sin(a)*1.5,true); if(Math.random()<0.15)addParticle(ox,oy,rnd(-30,30),rnd(-30,30),0.25,3,'#9af2ff'); } } } }
  if(player.invuln<=0){ const near=queryCircle(player.x,player.y,player.radius+30);
    for(const e of near){ if(e.dead)continue; const rr=player.radius+e.r; if((e.x-player.x)*(e.x-player.x)+(e.y-player.y)*(e.y-player.y)<rr*rr){ hurtPlayer(e._dmg); const a=Math.atan2(player.y-e.y,player.x-e.x); player.x+=Math.cos(a)*14; player.y+=Math.sin(a)*14; break; } } }
}
function damageEnemy(e,dmg,kbx,kby,quiet){
  let crit=false;
  if(!quiet && player.critChance>0 && Math.random()<player.critChance){ dmg*=1.6+Math.random()*0.8; crit=true; }
  e.hp-=dmg; e.flash=0.12;
  if(!e.boss){ e.kbx+=kbx; e.kby+=kby; }
  if(!quiet) sfx.hit();
  if(crit){ popText(e.x,e.y-6,'CRIT '+Math.round(dmg),'#ffd34a'); shake.mag=Math.max(shake.mag,3.5); }
  if(Math.random()<0.5) addParticle(e.x,e.y,kbx*6+rnd(-30,30),kby*6+rnd(-30,30),0.25,3,crit?'#ffd34a':e.color);
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  if(e.dead)return; e.dead=true; run.kills++;
  const now=run.time;
  if(now-run.multiKillTime<1.2) run.multiKill++; else run.multiKill=1; run.multiKillTime=now;
  run.streak++; if(run.streak>run.maxStreak)run.maxStreak=run.streak; run.lastKillTime=now;
  if(run.multiKill>=2){ const names=['','','DOUBLE KILL','TRIPLE KILL','MEGA KILL','ULTRA KILL','MONSTER KILL','GODLIKE']; announce(names[Math.min(run.multiKill,7)],run.multiKill>=5?'#ffd34a':'#9af2ff',40+Math.min(run.multiKill,6)*3); }
  if(run.streak%10===0 && run.streak>run.lastMilestone){ announce('COMBO x'+run.streak,'#46e0ff',46); run.lastMilestone=run.streak; sdkHappy(); }
  run.score+=Math.round((e.xp*8+4)*(1+run.streak*0.04)*(1+(run.multiKill-1)*0.12));
  checkAch();
  const np=e.boss?34:10; for(let i=0;i<np;i++){ const a=rnd(TAU),s=rnd(40,e.boss?320:180); addParticle(e.x,e.y,Math.cos(a)*s,Math.sin(a)*s,rnd(0.3,0.7),rnd(3,e.boss?10:7),e.color); }
  shake.mag=Math.max(shake.mag,e.boss?16:2.4);
  if(e.boss){ sfx.explode(); announce('SENTINEL DOWN','#ffcf4a',44); unlockAch('sentinel'); dropGem(e.x,e.y,e.xp); pickups.push({type:'heal',x:e.x,y:e.y,r:13,value:0.35}); }
  else dropGem(e.x,e.y,e.xp);
  if(e.type==='splitter'){ for(let i=0;i<3;i++){ const a=rnd(TAU); const c=ENEMIES.shard; enemies.push({id:idc++,type:'shard',x:e.x+Math.cos(a)*10,y:e.y+Math.sin(a)*10,vx:0,vy:0,kbx:Math.cos(a)*6,kby:Math.sin(a)*6,r:c.r,hp:c.hp,maxhp:c.hp,speed:c.speed,dmg:c.dmg,_dmg:c.dmg,xp:c.xp,color:c.color,sides:c.sides,spin:rnd(TAU),spv:rnd(-2,2),flash:0,boss:false,dead:false}); } }
}
function dropGem(x,y,xp){ if(gems.length>=CFG.caps.gems)return; const a=rnd(TAU),s=rnd(20,70); gems.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,value:xp,r:xp>=12?8:xp>=5?6:4,mag:false}); }
function hurtPlayer(d){ if(!isFinite(d))d=6; d*=(1-player.armor); player.hp-=d; player.invuln=CFG.player.invuln; player.hurtFlash=0.5; shake.mag=Math.max(shake.mag,9); sfx.hurt(); if(run.streak>=5)announce('COMBO BROKEN','#ff5b6e',38); run.streak=0; run.lastMilestone=0; run.multiKill=0; if(player.hp<=0){player.hp=0; onDeath();} }

/* ===================== GEMS / PICKUPS / FX ===================== */
function updateGems(dt){
  const pr=CFG.player.pickup*player.pickupMul;
  for(let i=gems.length-1;i>=0;i--){ const g=gems[i]; const dx=player.x-g.x,dy=player.y-g.y,d=Math.hypot(dx,dy)||0.001;
    if(d<pr||g.mag){ g.mag=true; const sp=Math.min(620,180+(pr-d)*4); g.vx=lerp(g.vx,dx/d*sp,0.25); g.vy=lerp(g.vy,dy/d*sp,0.25); }
    else { g.vx*=0.9; g.vy*=0.9; }
    g.x+=g.vx*dt; g.y+=g.vy*dt;
    if(d<player.radius+8){ addXP(g.value); sfx.pickup(); addParticle(g.x,g.y,0,0,0.2,5,'#7cfc8a'); gems.splice(i,1); } }
  for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; const dx=player.x-p.x,dy=player.y-p.y,d=Math.hypot(dx,dy)||0.001;
    if(d<pr*1.1){ const sp=260; p.x+=dx/d*sp*dt; p.y+=dy/d*sp*dt; }
    if(d<player.radius+12){ player.hp=Math.min(player.maxHP,player.hp+player.maxHP*p.value); popText(player.x,player.y-20,'+'+Math.round(player.maxHP*p.value),'#7cfc8a'); sfx.revive(); pickups.splice(i,1); } }
}
function addParticle(x,y,vx,vy,life,size,color){ if(particles.length>=CFG.caps.particles)particles.shift(); particles.push({x:x,y:y,vx:vx,vy:vy,life:life,max:life,size:size,color:color}); }
function updateParticles(dt){ for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.life-=dt; if(p.life<=0){particles.splice(i,1);continue;} p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92; } }
function popText(x,y,txt,color){ if(texts.length>=CFG.caps.texts)texts.shift(); texts.push({x:x,y:y,txt:String(txt),color:color,life:0.85,max:0.85}); }
function updateTexts(dt){ for(let i=texts.length-1;i>=0;i--){ const t=texts[i]; t.life-=dt; t.y-=34*dt; if(t.life<=0)texts.splice(i,1); } }

function updateAnnounces(dt){ for(let i=announces.length-1;i>=0;i--){ announces[i].life-=dt; if(announces[i].life<=0)announces.splice(i,1); } }
const ACH={firstblood:'FIRST BLOOD',streak10:'10 STREAK',streak25:'25 STREAK',streak50:'50 STREAK',godlike:'GODLIKE',slayer:'500 KILLS',sentinel:'SENTINEL SLAYER'};
function unlockAch(id){ if(meta.ach.indexOf(id)>=0)return; meta.ach.push(id); saveMeta(); announce('\u2605 '+ACH[id],'#ffd34a',36); }
function checkAch(){ if(run.kills>=1)unlockAch('firstblood'); if(run.maxStreak>=10)unlockAch('streak10'); if(run.maxStreak>=25)unlockAch('streak25'); if(run.maxStreak>=50)unlockAch('streak50'); if(run.multiKill>=6)unlockAch('godlike'); if(run.kills>=500)unlockAch('slayer'); }

/* ===================== XP / LEVEL UP ===================== */
function addXP(v){ run.xp+=v*player.xpMul; while(run.xp>=run.xpNeed){ run.xp-=run.xpNeed; run.level++; run.xpNeed=xpReq(run.level); run.pendingLevel++; } if(run.pendingLevel>0&&state===PLAYING) openLevelUp(); }
function buildOffers(){
  const pool=[];
  for(const w of player.weapons){ const d=WDEF[w.type]; if(w.level<d.max) pool.push({kind:'wlvl',type:w.type}); }
  const owned=new Set(player.weapons.map(function(w){return w.type;}));
  if(player.weapons.length<5){ for(const t in WDEF){ if(!owned.has(t)) pool.push({kind:'wnew',type:t}); } }
  for(const t in PDEF){ const lv=player.passt[t]; if(lv<PDEF[t].max) pool.push({kind:'plvl',type:t,lv:lv}); }
  shuffle(pool);
  const out=pool.slice(0,3);
  while(out.length<3) out.push(Math.random()<0.5?{kind:'heal'}:{kind:'bomb'});
  out.forEach(function(o){ const r=Math.random(); if(o.kind==='heal'||o.kind==='bomb'){o.rarity='common';o.lvls=1;} else if(r<0.06){o.rarity='legendary';o.lvls=3;} else if(r<0.30){o.rarity='epic';o.lvls=2;} else {o.rarity='common';o.lvls=1;} });
  return out;
}
function applyOffer(o){
  const n=o.lvls||1;
  if(o.kind==='wnew'){ player.weapons.push({type:o.type,level:Math.min(WDEF[o.type].max,n),t:0}); }
  else if(o.kind==='wlvl'){ const w=player.weapons.find(function(w){return w.type===o.type;}); w.level=Math.min(WDEF[o.type].max,w.level+n); }
  else if(o.kind==='plvl'){ const d=PDEF[o.type]; player.passt[o.type]=Math.min(d.max,player.passt[o.type]+n); if(o.type==='maxhp')player.hp+=25*n; recompute(); }

/* ===================== DEATH / REVIVE ===================== */

function score(){ return run.score; }

  for(const e of enemies){ if(e.dead)continue; const d=Math.hypot(e.x-player.x,e.y-player.y); if(d<240&&d>0.001){ if(e.boss){ e.kbx+=(e.x-player.x)/d*40; e.kby+=(e.y-player.y)/d*40; } else { const a=Math.atan2(e.y-player.y,e.x-player.x); damageEnemy(e,9999,Math.cos(a)*8,Math.sin(a)*8);} } }

/* ===================== MAIN LOOP ===================== */
let last=performance.now();
function frame(t){ requestAnimationFrame(frame); let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05; if(dt<0)dt=0;
  if(state===PLAYING) update(dt); render(); }
function update(dt){
  run.time+=dt; if(run.bannerT>0)run.bannerT-=dt; if(run.reviveFlash>0)run.reviveFlash-=dt;
  let ix=0,iy=0;
  if(joy.active){ ix=joy.dx/joy.max; iy=joy.dy/joy.max; }
  else { if(keys['arrowleft']||keys['a'])ix-=1; if(keys['arrowright']||keys['d'])ix+=1; if(keys['arrowup']||keys['w'])iy-=1; if(keys['arrowdown']||keys['s'])iy+=1; }
  const il=Math.hypot(ix,iy); if(il>1){ix/=il;iy/=il;}
  player.vx=ix*CFG.player.speed*player.speedMul; player.vy=iy*CFG.player.speed*player.speedMul;
  player.x+=player.vx*dt; player.y+=player.vy*dt;
  player.moving=il>0.05; if(player.moving){ player.angle=Math.atan2(iy,ix); if(Math.random()<0.7)addParticle(player.x-Math.cos(player.angle)*12,player.y-Math.sin(player.angle)*12,-player.vx*0.2+rnd(-20,20),-player.vy*0.2+rnd(-20,20),0.3,4,'#46e0ff'); }
  if(player.invuln>0)player.invuln-=dt; if(player.hurtFlash>0)player.hurtFlash-=dt;
  if(player.regen>0)player.hp=Math.min(player.maxHP,player.hp+player.regen*dt);

  updateWeapons(dt);
  spawnEnemies(dt);
  updateEnemies(dt);
  buildGrid();
  updateProjectiles(dt);
  collisions(dt);
  updateGems(dt);
  updateParticles(dt); updateTexts(dt); updateAnnounces(dt);
  if(run.streak>0&&run.time-run.lastKillTime>2){ run.streak=0; run.lastMilestone=0; }

  if(enemies.length) enemies=enemies.filter(function(e){return !e.dead;});
  bullets=bullets.filter(function(b){return !b.dead;});
  missiles=missiles.filter(function(m){return !m.dead;});
  novas=novas.filter(function(n){return !n.dead;});

  cam.x+=((player.x-W/2)-cam.x)*Math.min(1,dt*14);
  cam.y+=((player.y-H/2)-cam.y)*Math.min(1,dt*14);
  shake.mag*=0.86; if(shake.mag<0.1)shake.mag=0;
}

/* ===================== RENDER ===================== */
function render(){
  const camX=cam.x+(shake.mag?rnd(-shake.mag,shake.mag):0);

  const time=performance.now()/1000;
  ctx.fillStyle='#05070f'; ctx.fillRect(0,0,W,H);
  for(const s of stars){ const sx=((s.x-camX*s.z)%W+W)%W, sy=((s.y-camY*s.z)%H+H)%H; const a=s.a*(0.6+0.4*Math.sin(time*s.tw+s.ph)); ctx.fillStyle=hexA('#bfe9ff',a); ctx.fillRect(sx,sy,s.s,s.s); }
  const S2=64;
  const ox=-(((camX%S2)+S2)%S2), oy=-(((camY%S2)+S2)%S2);
  ctx.lineWidth=1; ctx.strokeStyle='rgba(70,224,255,0.045)'; ctx.beginPath();
  for(let x=ox;x<W;x+=S2){ ctx.moveTo(x,0);ctx.lineTo(x,H);} for(let y=oy;y<H;y+=S2){ ctx.moveTo(0,y);ctx.lineTo(W,y);} ctx.stroke();
  ctx.strokeStyle='rgba(70,224,255,0.10)'; ctx.beginPath();
  const bigx=-((((camX)%(S2*4))+(S2*4))%(S2*4)), bigy=-((((camY)%(S2*4))+(S2*4))%(S2*4));
  for(let x=bigx;x<W;x+=S2*4){ ctx.moveTo(x,0);ctx.lineTo(x,H);} for(let y=bigy;y<H;y+=S2*4){ ctx.moveTo(0,y);ctx.lineTo(W,y);} ctx.stroke();

  if(state===MENU){ const vg0=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.75); vg0.addColorStop(0,'rgba(0,0,0,0)'); vg0.addColorStop(1,'rgba(0,0,0,0.6)'); ctx.fillStyle=vg0; ctx.fillRect(0,0,W,H); return; }

  const sX=function(x){return x-camX;}, sY=function(y){return y-camY;};

  ctx.globalCompositeOperation='lighter';
  for(const g of gems){ blit('#7cfc8a',sX(g.x),sY(g.y),g.r*2.4); }
  for(const p of pickups){ blit('#7cfc8a',sX(p.x),sY(p.y),20); }
  for(const e of enemies){ blit(e.color,sX(e.x),sY(e.y),e.r*(e.boss?2.0:1.7)); }
  for(const w of player.weapons){ if(w.type==='orbital'&&w._orbs)for(const o of w._orbs) blit('#9af2ff',sX(o.x),sY(o.y),16); }
  for(const nv of novas){ const al=clamp(1-nv.t/nv.dur,0,1); ctx.strokeStyle=hexA('#9af2ff',al*0.8); ctx.lineWidth=4+al*6; ctx.beginPath(); ctx.arc(sX(nv.x),sY(nv.y),nv.r,0,TAU); ctx.stroke(); }
  for(const m of missiles){ blit('#ffb24a',sX(m.x),sY(m.y),12); }
  for(const b of bullets){ blit(b.color,sX(b.x),sY(b.y),b.r*2.6); }
  for(const p of particles){ const k=p.life/p.max; blit(p.color,sX(p.x),sY(p.y),p.size*(0.6+k)); }
  blit('#46e0ff',sX(player.x),sY(player.y),26);
  ctx.globalCompositeOperation='source-over';

  for(const e of enemies){ drawEnemy(e,sX(e.x),sY(e.y)); }
  for(const g of gems){ drawGem(sX(g.x),sY(g.y),g.r); }
  ctx.fillStyle='#ffffff'; for(const b of bullets){ ctx.beginPath(); ctx.arc(sX(b.x),sY(b.y),b.r*0.6,0,TAU); ctx.fill(); }
  for(const w of player.weapons){ if(w.type==='orbital'&&w._orbs)for(const o of w._orbs){ ctx.fillStyle='#cdf6ff'; ctx.beginPath(); ctx.arc(sX(o.x),sY(o.y),6,0,TAU); ctx.fill(); } }
  for(const p of pickups){ drawHeal(sX(p.x),sY(p.y)); }
  drawShip(sX(player.x),sY(player.y));

  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const t of texts){ const a=clamp(t.life/t.max,0,1); ctx.font='700 14px Chakra Petch, monospace'; ctx.fillStyle=hexA(t.color,a); ctx.fillText(t.txt,sX(t.x),sY(t.y)); }

  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.32,W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)'); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  if(player.hurtFlash>0){ ctx.fillStyle=hexA('#ff2d4f',player.hurtFlash*0.4); ctx.fillRect(0,0,W,H); }
  if(run.reviveFlash>0){ ctx.fillStyle=hexA('#9af2ff',run.reviveFlash*0.5); ctx.fillRect(0,0,W,H); }

  drawAnnounces();
  drawHUD();
  if(joy.active) drawJoystick();
  if(run.bannerT>0) drawBanner();
}
function poly(x,y,r,sides,rot){ ctx.beginPath(); for(let i=0;i<sides;i++){ const a=rot+i/sides*TAU; const px=x+Math.cos(a)*r,py=y+Math.sin(a)*r; if(i)ctx.lineTo(px,py);else ctx.moveTo(px,py);} ctx.closePath(); }
function drawEnemy(e,x,y){
  const rot=e.type==='drone'?Math.atan2(player.y-e.y,player.x-e.x)+Math.PI/2:e.spin;

  ctx.fillStyle=hexA(e.color,0.18); ctx.fill();

}
function drawGem(x,y,r){ ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4); ctx.fillStyle='#0a1f12'; ctx.strokeStyle='#7cfc8a'; ctx.lineWidth=1.6; ctx.fillRect(-r,-r,r*2,r*2); ctx.strokeRect(-r,-r,r*2,r*2); ctx.restore(); }
function drawHeal(x,y){ ctx.strokeStyle='#7cfc8a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x-7,y);ctx.lineTo(x+7,y);ctx.moveTo(x,y-7);ctx.lineTo(x,y+7); ctx.stroke(); }

function drawJoystick(){ const ox=joy.ox,oy=joy.oy; ctx.strokeStyle='rgba(70,224,255,.3)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(ox,oy,joy.max,0,TAU); ctx.stroke(); ctx.fillStyle='rgba(70,224,255,.22)'; ctx.beginPath(); ctx.arc(ox+joy.dx,oy+joy.dy,22,0,TAU); ctx.fill(); ctx.strokeStyle='rgba(154,242,255,.7)'; ctx.beginPath(); ctx.arc(ox+joy.dx,oy+joy.dy,22,0,TAU); ctx.stroke(); }
function drawBanner(){ const a=clamp(run.bannerT,0,1); ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='700 20px Chakra Petch, monospace'; ctx.fillStyle=hexA('#ff5c8a',Math.min(1,a)*0.95); ctx.fillText(run.banner,W/2,safeTop+118); }
function drawAnnounces(){ ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<announces.length;i++){ const a=announces[i]; const k=a.life/a.max; const al=clamp(k<0.3?k/0.3:1,0,1); const sc=1+(1-k)*0.22; const y=H*0.30+i*40-(1-k)*16;
    ctx.save(); ctx.translate(W/2,y); ctx.scale(sc,sc); ctx.font='700 '+a.size+'px Chakra Petch, monospace'; ctx.lineWidth=4; ctx.strokeStyle=hexA('#04060d',al*0.8); ctx.strokeText(a.text,0,0); ctx.fillStyle=hexA(a.color,al); ctx.fillText(a.text,0,0); ctx.restore(); } }

  ctx.fillStyle='#9af2ff'; ctx.beginPath(); ctx.moveTo(btnMute.x+12,top+17);ctx.lineTo(btnMute.x+18,top+17);ctx.lineTo(btnMute.x+24,top+11);ctx.lineTo(btnMute.x+24,top+31);ctx.lineTo(btnMute.x+18,top+25);ctx.lineTo(btnMute.x+12,top+25);ctx.closePath(); ctx.fill();

function roundRect(x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ===================== INPUT ===================== */
function hitBtn(b,x,y){ return x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h; }
canvas.addEventListener('pointerdown',function(e){
  audioInit(); audioResume();
  if(state!==PLAYING) return;
  const x=e.clientX,y=e.clientY;
  if(hitBtn(btnPause,x,y)){ pauseGame(); return; }
  if(hitBtn(btnMute,x,y)){ toggleMute(); return; }
  joy.active=true; joy.id=e.pointerId; joy.ox=x; joy.oy=y; joy.dx=0; joy.dy=0;
});
canvas.addEventListener('pointermove',function(e){ if(!joy.active||e.pointerId!==joy.id)return; let dx=e.clientX-joy.ox,dy=e.clientY-joy.oy; const d=Math.hypot(dx,dy); if(d>joy.max){dx=dx/d*joy.max;dy=dy/d*joy.max;} joy.dx=dx;joy.dy=dy; });
function endJoy(e){ if(e.pointerId===joy.id){ joy.active=false; joy.id=null; joy.dx=0;joy.dy=0; } }
canvas.addEventListener('pointerup',endJoy); canvas.addEventListener('pointercancel',endJoy);
addEventListener('keydown',function(e){ const k=e.key.toLowerCase(); keys[k]=true; if(k==='p'){ if(state===PLAYING)pauseGame(); else if(state===PAUSED)resumeGame(); } if(k==='arrowup'||k==='arrowdown'||k==='arrowleft'||k==='arrowright'||k===' ')e.preventDefault(); });

function makeCard(o){

  else rb.style.display='none';
  $('go-menu').textContent=canRevive?'End Run':'Main Menu';
  $('gameover').classList.add('show');
}
$('go-revive').addEventListener('click',function(){ if(run.revivesLeft>0){ run.revivesLeft--; doRevive(); } else { $('gameover').classList.remove('show'); sdkRewarded(function(ok){ doRevive(); }); } });
$('go-menu').addEventListener('click',function(){ finalizeRun(); showMenu(); });
$('p-resume').addEventListener('click',resumeGame);
$('p-quit').addEventListener('click',function(){ finalizeRun(); state=DEAD; showMenu(); });
$('m-play').addEventListener('click',function(){ audioInit(); audioResume(); startRun(); });

/* ===================== META SHOP ===================== */
function metaCost(d,lv){ return d.base*(lv+1); }
function renderShop(){
  const wrap=$('shop'); wrap.innerHTML='';
  META_DEF.forEach(function(d){
    const lv=meta.up[d.key]||0; const maxed=lv>=d.max; const cost=metaCost(d,lv);
    const row=document.createElement('div'); row.className='shoprow';
    let pips=''; for(let i=0;i<d.max;i++)pips+='<span class="pip'+(i<lv?' on':'')+'"></span>';
    row.innerHTML='<div class="nm">'+d.name+'<small>'+d.sub+'</small><div class="pips">'+pips+'</div></div>';
    const btn=document.createElement('button'); btn.className='buy'+(maxed?' max':'');
    if(maxed){ btn.textContent='MAX'; btn.disabled=true; }
    else { btn.textContent='\u25C6 '+cost; btn.disabled=meta.cores<cost; btn.addEventListener('click',function(){ if(meta.cores>=cost){ meta.cores-=cost; meta.up[d.key]=lv+1; saveMeta(); renderShop(); $('m-cores').textContent=meta.cores; } }); }
    row.appendChild(btn); wrap.appendChild(row);
  });
}

/* ===================== BOOT ===================== */
loadMeta();
showMenu();
requestAnimationFrame(frame);
})();
